<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="icon" href="/static/favicon.png" type="image/png">
<title>File-Trans 文件接收</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f7fa;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  h1 { font-size: 1.6rem; margin-bottom: 8px; color: #1a1a2e; }
  .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }

  /* ── 拖拽上传区 ── */
  #dropzone {
    width: 100%;
    max-width: 560px;
    border: 2px dashed #c0c8d8;
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: #fff;
  }
  #dropzone.drag-over {
    border-color: #4f6ef7;
    background: #eef1ff;
  }
  #dropzone p { color: #555; font-size: 1rem; line-height: 1.6; }
  #dropzone .icon { font-size: 2.4rem; margin-bottom: 8px; }
  #dropzone small { color: #aaa; display: block; margin-top: 8px; }

  /* ── 进度条 ── */
  #progress-wrap {
    width: 100%; max-width: 560px;
    height: 6px; border-radius: 3px; background: #e4e7ee;
    margin-top: 20px; overflow: hidden; display: none;
  }
  #progress-bar {
    height: 100%; width: 0; border-radius: 3px;
    background: linear-gradient(90deg, #4f6ef7, #6c5ce7);
    transition: width .15s;
  }

  /* ── 消息提示 ── */
  #msg {
    margin-top: 12px; font-size: 0.9rem; min-height: 1.4em;
    text-align: center; max-width: 560px; width: 100%;
  }
  #msg.ok   { color: #27ae60; }
  #msg.err  { color: #e74c3c; }

  /* ── 文件选择预览 ── */
  #selected-list {
    margin-top: 12px; max-width: 560px; width: 100%;
    font-size: 0.85rem; color: #666; text-align: center; display: none;
  }

  /* ── 已上传文件列表 ── */
  #file-list-wrap {
    width: 100%; max-width: 560px; margin-top: 32px;
  }
  #file-list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  #file-list-header h2 {
    font-size: 1rem; color: #444; font-weight: 600;
  }
  #refresh-btn {
    background: none; border: 1px solid #d0d5dd; border-radius: 6px;
    padding: 4px 12px; font-size: 0.8rem; color: #555; cursor: pointer;
    transition: background .15s;
  }
  #refresh-btn:hover { background: #eef1ff; border-color: #4f6ef7; color: #4f6ef7; }
  #file-list {
    list-style: none; background: #fff; border-radius: 10px;
    border: 1px solid #e4e7ee; overflow: hidden;
  }
  #file-list li {
    display: flex; align-items: center; padding: 10px 16px;
    border-bottom: 1px solid #f0f2f5; font-size: 0.88rem;
    transition: background .1s;
  }
  #file-list li:last-child { border-bottom: none; }
  #file-list li:hover { background: #f8f9fc; }
  #file-list .fname {
    flex: 1; color: #333; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
    text-decoration: none;
  }
  #file-list .fname:hover { color: #4f6ef7; }
  #file-list .fsize {
    color: #999; font-size: 0.8rem; margin-left: 12px;
    white-space: nowrap;
  }
  #file-list .fempty {
    padding: 24px; text-align: center; color: #aaa; font-size: 0.85rem;
  }
</style>
</head>
<body>

<h1>File-Trans 文件接收</h1>
<p class="subtitle">拖拽或点击上传 · 最大 200 MB / 文件</p>

<div id="dropzone" tabindex="0">
  <div class="icon">&#x1F4E4;</div>
  <p>将文件拖到此处，或点击选择文件</p>
  <small>支持多文件 · 单文件上限 200 MB</small>
</div>

<input type="file" id="fileInput" multiple hidden>

<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="msg"></div>
<div id="selected-list"></div>

<div id="file-list-wrap">
  <div id="file-list-header">
    <h2>已上传文件</h2>
    <button id="refresh-btn" onclick="loadFileList()">刷新</button>
  </div>
  <ul id="file-list"><li class="fempty">加载中...</li></ul>
</div>

<script>
const dropzone     = document.getElementById("dropzone");
const fileInput    = document.getElementById("fileInput");
const progWrap     = document.getElementById("progress-wrap");
const progBar      = document.getElementById("progress-bar");
const msg          = document.getElementById("msg");
const selectedList = document.getElementById("selected-list");

const MAX_BYTES    = 200 * 1024 * 1024; // 200 MB

// ── 拖拽事件 ──
dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("drag-over"); });
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("drag-over");
  if (e.dataTransfer.files.length) uploadFiles(Array.from(e.dataTransfer.files));
});
dropzone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files.length) {
    uploadFiles(Array.from(fileInput.files));
    fileInput.value = "";
  }
});

// ── 上传逻辑（多文件） ──
function uploadFiles(files) {
  // 前端校验大小
  const tooBig = files.find(f => f.size > MAX_BYTES);
  if (tooBig) {
    showMsg(`"${fmtName(tooBig.name)}" 超过 200 MB，已跳过`, "err");
    files = files.filter(f => f.size <= MAX_BYTES);
  }
  if (!files.length) return;

  selectedList.textContent = `准备上传 ${files.length} 个文件…`;
  selectedList.style.display = "block";
  progWrap.style.display = "block";
  progBar.style.width = "0%";
  showMsg("上传中...", "");

  const fd = new FormData();
  files.forEach(f => fd.append("file", f));

  const xhr = new XMLHttpRequest();
  xhr.open("POST", "/upload");
  xhr.upload.addEventListener("progress", e => {
    if (e.lengthComputable) progBar.style.width = Math.round(e.loaded / e.total * 100) + "%";
  });
  xhr.addEventListener("load", () => {
    progWrap.style.display = "none";
    selectedList.style.display = "none";
    try {
      const r = JSON.parse(xhr.responseText);
      if (r.uploaded > 0) {
        showMsg(`✓ ${r.uploaded} 个文件上传成功`, "ok");
        loadFileList();
        if (r.errors && r.errors.length) {
          setTimeout(() => showMsg(r.errors.join("；"), "err"), 2000);
        }
      } else {
        showMsg(r.error || r.errors?.join("；") || "全部上传失败", "err");
      }
    } catch { showMsg("服务器返回异常", "err"); }
  });
  xhr.addEventListener("error", () => {
    progWrap.style.display = "none";
    selectedList.style.display = "none";
    showMsg("网络错误，请重试", "err");
  });
  xhr.send(fd);
}

// ── 工具函数 ──
function showMsg(text, type) { msg.textContent = text; msg.className = type || ""; }
function fmtName(s) { const d = document.createElement("span"); d.textContent = s; return d.innerHTML; }
function fmtSize(b) {
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  if (b < 1073741824) return (b / 1048576).toFixed(1) + " MB";
  return (b / 1073741824).toFixed(2) + " GB";
}

// ── 文件列表 ──
const fileListEl = document.getElementById("file-list");

async function loadFileList() {
  try {
    const res = await fetch("/api/files");
    const files = await res.json();
    if (!files.length) {
      fileListEl.innerHTML = '<li class="fempty">暂无文件</li>';
      return;
    }
    fileListEl.innerHTML = files.map(f =>
      `<li><a class="fname" href="/uploads/${encodeURIComponent(f.name)}" title="${fmtName(f.name)}">${fmtName(f.name)}</a><span class="fsize">${fmtSize(f.size)}</span></li>`
    ).join("");
  } catch {
    fileListEl.innerHTML = '<li class="fempty">加载失败</li>';
  }
}

loadFileList();
</script>
</body>
</html>
